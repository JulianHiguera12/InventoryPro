<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/IMG/Logo_InventoryProCopy.png">


       <!-- CSS modular -->
        <link rel="stylesheet" href="../CSS/header.css">
        <link rel="stylesheet" href="../CSS/mainContainer.css">

        <!-- CSS Gestión de Usuarios (aislado) -->
        <link rel="stylesheet" href="../CSS/gestionUsuarios.css">
        <link rel="stylesheet" href="../CSS/modalesUsuarios.css">
</head>
<body>
        <!-- HEADER SUPERIOR -->
        <header class="topbar">
            <!-- Logo -->
            <div class="topbar-left">
                <div class="logo">InventoryPro</div>
            </div>

            <!-- Notificaciones y usuario -->
            <div class="topbar-right">
                <!-- Icono de notificaciones -->
                <button class="notification-btn" title="Notificaciones">
                </button>

                <!-- Usuario en el header -->
                    <!-- Usuario en el header -->
                <nav class="user-menu" aria-label="Menú de usuario">
                    <button class="user-info" id="userInfo" aria-haspopup="true" aria-expanded="false">
                    <img src="/IMG/man.png" alt="Avatar del usuario" class="user-icon">
                    <span id="nombreUsuario">Cargando...</span>
                </button>

                    <!-- Dropdown -->
                    <div class="user-dropdown" id="userDropdown">
                        <a href="../HTML/gestionUsuarios.html" class="dropdown-item">👤 Mi Perfil</a>
                        <button id="btnCerrarSesion" class="logout-btn">🚪 Cerrar Sesión</button>
                    </div>
                </nav>
            </div>
        </header>

        <div class="main-container">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <ul>
                        <li id="navInicio"><a href="/HTML/home.html">Inventario</a></li>
                        <li id="navRegistro"><a href="/HTML/registroProductos.html">Registro de Productos</a></li>
                        <li id="navReportes"><a href="/HTML/reportes.html">Reportes</a></li>
                        <li id="navConfiguraciones"><a href="/HTML/configuraciones.html">Gestión de usuarios</a></li>
                    </ul>
                </nav>

                <!-- Logo agregado debajo del menú (sin tocar nada de arriba) -->
                <div class="sidebar-logo">
                    <img src="/IMG/Logo_InventoryProCopy.png" alt="InventoryPro Logo" class="logo-img">
                </div>
            </aside>
        

            <!--   CONTENIDO PRINCIPAL (dentro de .main-container)  -->

            <section class="dashboard-users">
                <h2>Información de Usuario</h2>

            <!-- Información del Administrador -->
            <div class="admin-info">
                <img src="../IMG/man.png" alt="Avatar" class="user-icon">
                <div class="admin-details">
                    <h3 id="adminNombre">Cargando...</h3>
                    <p id="adminRol">—</p>
                    <p id="adminCorreo">—</p>
                    <p id="adminTelefono">—</p>
                </div>
            </div>

            </section>

        </div>
        <!-- Scripts propios -->
        <script type="module" src="/JS/firebase.js"></script>
        <script type="module" src="/JS/modalesUsuarios.js"></script>
        <script type="module" src="/JS/gestionUsuarios.js"></script>
        <script type="module" src="/JS/usuarios.js"></script>

</body>
</html>
